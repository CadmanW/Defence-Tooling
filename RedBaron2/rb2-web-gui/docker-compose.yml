services:
  rb2-web-gui:
    build:
      context: .
      dockerfile: Dockerfile
    image: rb2-web-gui:vendored
    ports:
      - "8080:8080"
    command:
      - -endpoint
      - ${RB2_WEB_ENDPOINT:-http://minio:9000}
      - -bucket
      - ${RB2_WEB_BUCKET:-rb2-tty}
      - -region
      - ${RB2_WEB_REGION:-us-east-1}
      - -access-key
      - ${RB2_WEB_ACCESS_KEY:-minioadmin}
      - -secret-key
      - ${RB2_WEB_SECRET_KEY:-minioadmin}
      - -path-style
      - -db
      - /data/rb2tty.db
    volumes:
      - rb2-web-gui-data:/data

volumes:
  rb2-web-gui-data:
