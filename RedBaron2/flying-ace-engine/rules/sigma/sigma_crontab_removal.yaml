name: sigma_crontab_removal
mode: alert
eval: |
  (
    e.process_name.ends_with("crontab") && e.process_args.contains(" -r")
  )
tests:
  - cleartext: "crontab remove"
    process_name: crontab
    process_args: "crontab -r"
    should_match: true
  - cleartext: "crontab list"
    process_name: crontab
    process_args: "crontab -l"
    should_match: false
