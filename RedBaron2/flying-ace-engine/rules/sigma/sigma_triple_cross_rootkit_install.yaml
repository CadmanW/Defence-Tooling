name: sigma_triple_cross_rootkit_install
mode: alert
eval: |
  (
    e.process_name == "sudo" && (e.process_args.contains(" tc ") && e.process_args.contains(" enp0s3 ")) && (e.process_args.contains(" qdisc ") || e.process_args.contains(" filter "))
  )

tests:
  - cleartext: "sudo tc enp0s3 qdisc"
    process_name: sudo
    process_args: "sudo tc qdisc add dev enp0s3 ingress"
    should_match: true
  - cleartext: "sudo tc enp0s3 filter"
    process_name: sudo
    process_args: "sudo tc filter add dev enp0s3 parent ffff:"
    should_match: true
  - cleartext: "normal sudo"
    process_name: sudo
    process_args: "sudo apt update"
    should_match: false
