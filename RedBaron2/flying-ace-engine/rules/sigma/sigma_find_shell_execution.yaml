name: sigma_find_shell_execution
mode: alert
eval: |
  (
    (e.process_name == "find" && (e.process_args.contains(" . ") && e.process_args.contains("-exec"))) && ((e.process_args.contains("/bin/bash") || e.process_args.contains("/bin/dash") || e.process_args.contains("/bin/fish") || e.process_args.contains("/bin/sh") || e.process_args.contains("/bin/zsh")))
  )

tests:
  - cleartext: "find with -exec and shell"
    process_name: find
    process_args: "find . -name '*.txt' -exec /bin/sh -c 'cat {}' \\;"
    should_match: true
  - cleartext: "find with -exec bash"
    process_name: find
    process_args: "find . -type f -exec /bin/bash {} \\;"
    should_match: true
  - cleartext: "normal find"
    process_name: find
    process_args: "find /var/log -name '*.log'"
    should_match: false
