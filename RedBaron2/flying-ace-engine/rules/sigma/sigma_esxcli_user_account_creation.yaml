name: sigma_esxcli_user_account_creation
mode: alert
eval: |
  (
    e.process_name == "esxcli" && (e.process_args.contains("system ") && e.process_args.contains("account ") && e.process_args.contains("add "))
  )

tests:
  - cleartext: "esxcli user account add"
    process_name: esxcli
    process_args: "esxcli system account add -i testuser"
    should_match: true
  - cleartext: "normal ls"
    process_name: ls
    process_args: "ls -la"
    should_match: false
