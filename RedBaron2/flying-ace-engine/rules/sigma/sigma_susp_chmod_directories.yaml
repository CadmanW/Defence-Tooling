name: sigma_susp_chmod_directories
mode: alert
eval: |
  (
    e.process_name == "chmod" && (e.process_args.contains("/tmp/") || e.process_args.contains("/.Library/") || e.process_args.contains("/etc/") || e.process_args.contains("/opt/"))
  )

tests:
  - cleartext: "chmod execution"
    process_name: chmod
    process_args: "chmod /tmp/"
    should_match: true
  - cleartext: "normal ls command"
    process_name: ls
    process_args: "ls -la"
    should_match: false
