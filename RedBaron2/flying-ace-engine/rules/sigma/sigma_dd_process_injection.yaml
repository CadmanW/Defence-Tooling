name: sigma_dd_process_injection
mode: alert
eval: |
  (
    e.process_name == "dd" && (e.process_args.contains("of=") && e.process_args.contains("/proc/") && e.process_args.contains("/mem"))
  )

tests:
  - cleartext: "dd to /proc/mem"
    process_name: dd
    process_args: "dd if=/tmp/payload of=/proc/1234/mem"
    should_match: true
  - cleartext: "normal dd"
    process_name: dd
    process_args: "dd if=/dev/sda of=/dev/sdb"
    should_match: false
