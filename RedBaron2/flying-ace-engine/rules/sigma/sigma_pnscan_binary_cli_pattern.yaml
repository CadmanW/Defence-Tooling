name: sigma_pnscan_binary_cli_pattern
mode: alert
eval: |
  (
    (e.process_args.contains("-W") || e.process_args.contains("-R")) &&
    re_match(e.process_args, "-(W|R)\\s?(\\s|\"|')([0-9a-fA-F]{2}\\s?){2,20}(\\s|\"|')")
  )
tests:
  - cleartext: "pnscan with -W hex pattern"
    process_name: pnscan
    process_args: "pnscan -W \"48 65 6c 6c 6f\" 192.168.1.0/24"
    should_match: true
  - cleartext: "command with -R hex bytes"
    process_name: test
    process_args: "test -R '41 42 43'"
    should_match: true
  - cleartext: "normal ls"
    process_name: ls
    process_args: "ls -la"
    should_match: false
