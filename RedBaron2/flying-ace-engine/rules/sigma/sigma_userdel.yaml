name: sigma_userdel
mode: alert
eval: |
  (
    e.process_name == "userdel"
  )

tests:
  - cleartext: "userdel execution"
    process_name: userdel
    process_args: "userdel"
    should_match: true
  - cleartext: "normal ls command"
    process_name: ls
    process_args: "ls -la"
    should_match: false
