name: sigma_dd_file_overwrite
mode: alert
eval: |
  (
    ((e.process_executable == "/bin/dd" || e.process_executable == "/usr/bin/dd")) && (e.process_args.contains("of=")) && ((e.process_args.contains("if=/dev/zero") || e.process_args.contains("if=/dev/null")))
  )
tests:
  - cleartext: "dd overwrite log with zero"
    process_name: dd
    process_executable: /bin/dd
    process_args: "dd if=/dev/zero of=/var/log/auth.log bs=1M count=10"
    should_match: true
  - cleartext: "dd overwrite with null"
    process_name: dd
    process_executable: /usr/bin/dd
    process_args: "dd if=/dev/null of=/var/log/messages"
    should_match: true
  - cleartext: "normal dd"
    process_name: dd
    process_args: "dd if=/dev/sda of=/backup/disk.img"
    should_match: false
