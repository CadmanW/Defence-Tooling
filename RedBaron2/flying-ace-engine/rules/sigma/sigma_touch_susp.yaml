name: sigma_touch_susp
mode: alert
eval: |
  (
    e.process_name == "touch" && e.process_args.contains(" -t ") && e.process_args.ends_with(".service")
  )

tests:
  - cleartext: "touch -t with .service file"
    process_name: touch
    process_args: "touch -t 202001010000 /etc/systemd/system/evil.service"
    should_match: true
  - cleartext: "touch -t with backdoor.service"
    process_name: touch
    process_args: "touch -t 201812311200 /tmp/backdoor.service"
    should_match: true
  - cleartext: "normal touch"
    process_name: touch
    process_args: "touch /tmp/newfile.txt"
    should_match: false
