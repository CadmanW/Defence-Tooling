name: sigma_esxcli_network_discovery
mode: alert
eval: |
  (
    (e.process_name == "esxcli" && e.process_args.contains("network")) && ((e.process_args.contains(" get") || e.process_args.contains(" list")))
  )

tests:
  - cleartext: "esxcli network discovery"
    process_name: esxcli
    process_args: "esxcli network nic list"
    should_match: true
  - cleartext: "normal ls"
    process_name: ls
    process_args: "ls -la"
    should_match: false
