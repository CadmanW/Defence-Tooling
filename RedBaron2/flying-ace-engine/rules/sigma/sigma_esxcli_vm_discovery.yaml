name: sigma_esxcli_vm_discovery
mode: alert
eval: |
  (
    e.process_name == "esxcli" && e.process_args.contains("vm process") && e.process_args.ends_with(" list")
  )

tests:
  - cleartext: "esxcli vm list"
    process_name: esxcli
    process_args: "esxcli vm process list"
    should_match: true
  - cleartext: "normal ls"
    process_name: ls
    process_args: "ls -la"
    should_match: false
