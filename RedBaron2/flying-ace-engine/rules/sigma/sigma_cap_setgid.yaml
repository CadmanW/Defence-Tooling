name: sigma_cap_setgid
mode: alert
eval: |
  (
    e.process_name == "setcap" && e.process_args.contains("cap_setgid")
  )

tests:
  - cleartext: "setcap execution"
    process_name: setcap
    process_args: "setcap cap_setgid"
    should_match: true
  - cleartext: "normal ls command"
    process_name: ls
    process_args: "ls -la"
    should_match: false
