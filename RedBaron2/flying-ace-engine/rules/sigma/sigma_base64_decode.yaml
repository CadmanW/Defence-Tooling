name: sigma_base64_decode
mode: alert
eval: |
  (
    e.process_name == "base64" && e.process_args.contains("-d")
  )

tests:
  - cleartext: "base64 execution"
    process_name: base64
    process_args: "base64 -d"
    should_match: true
  - cleartext: "normal ls command"
    process_name: ls
    process_args: "ls -la"
    should_match: false
