name: sigma_proxy_connection
mode: alert
overlap_allowed_with: [sigma_curl_usage]
eval: |
  (
    (e.process_args.contains("http_proxy=") || e.process_args.contains("https_proxy="))
  )
tests:
  - cleartext: "http_proxy env"
    process_name: curl
    process_args: "http_proxy=http://proxy:8080 curl example.com"
    should_match: true
  - cleartext: "https_proxy env"
    process_name: wget
    process_args: "https_proxy=https://proxy:8080 wget example.com"
    should_match: true
  - cleartext: "normal ls"
    process_name: ls
    process_args: "ls -la"
    should_match: false
