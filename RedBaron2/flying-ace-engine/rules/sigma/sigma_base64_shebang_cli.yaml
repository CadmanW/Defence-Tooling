name: sigma_base64_shebang_cli
mode: alert
eval: |
  (
    (e.process_args.contains("IyEvYmluL2Jhc2") || e.process_args.contains("IyEvYmluL2Rhc2") || e.process_args.contains("IyEvYmluL3pza") || e.process_args.contains("IyEvYmluL2Zpc2") || e.process_args.contains("IyEvYmluL3No"))
  )
tests:
  - cleartext: "base64 with shebang"
    process_name: bash
    process_args: "bash -c 'echo IyEvYmluL2Jhc2g= | base64 -d'"
    should_match: true
  - cleartext: "normal base64"
    process_name: base64
    process_args: "base64 file.txt"
    should_match: false
