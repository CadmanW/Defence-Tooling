name: sigma_triple_cross_rootkit_execve_hijack
mode: alert
eval: |
  (
    e.process_name == "sudo" && e.process_args.contains("execve_hijack")
  )

tests:
  - cleartext: "sudo execution"
    process_name: sudo
    process_args: "sudo execve_hijack"
    should_match: true
  - cleartext: "normal ls command"
    process_name: ls
    process_args: "ls -la"
    should_match: false
