name: sigma_schedule_task_job_cron
mode: alert
eval: |
  (
    e.process_name.ends_with("crontab") && e.process_args.contains("/tmp/")
  )
tests:
  - cleartext: "crontab with tmp"
    process_name: crontab
    process_args: "crontab /tmp/malicious_cron"
    should_match: true
  - cleartext: "crontab list"
    process_name: crontab
    process_args: "crontab -l"
    should_match: false
