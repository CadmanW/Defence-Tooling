name: sigma_esxcli_vsan_discovery
mode: alert
eval: |
  (
    (e.process_name == "esxcli" && e.process_args.contains("vsan")) && ((e.process_args.contains(" get") || e.process_args.contains(" list")))
  )

tests:
  - cleartext: "esxcli vsan cluster"
    process_name: esxcli
    process_args: "esxcli vsan cluster get"
    should_match: true
  - cleartext: "normal ls"
    process_name: ls
    process_args: "ls -la"
    should_match: false
