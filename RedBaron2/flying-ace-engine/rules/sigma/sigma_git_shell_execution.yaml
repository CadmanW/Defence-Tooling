name: sigma_git_shell_execution
mode: alert
eval: |
  (
    e.process_pname == "git" && false /* ParentCommandLine not available in Rhai API */ && (e.process_args.contains("bash 0<&1") || e.process_args.contains("dash 0<&1") || e.process_args.contains("sh 0<&1"))
  )
tests:
  - cleartext: "bash spawned from git - will never match due to false in eval"
    process_name: bash
    process_args: "bash 0<&1"
    should_match: false
  - cleartext: "normal git"
    process_name: git
    process_args: "git status"
    should_match: false
