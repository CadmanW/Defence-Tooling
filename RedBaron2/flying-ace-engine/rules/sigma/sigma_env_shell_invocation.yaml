name: sigma_env_shell_invocation
mode: alert
eval: |
  (
    e.process_name == "env" && (e.process_args.ends_with("/bin/bash") || e.process_args.ends_with("/bin/dash") || e.process_args.ends_with("/bin/fish") || e.process_args.ends_with("/bin/sh") || e.process_args.ends_with("/bin/zsh"))
  )

tests:
  - cleartext: "env spawning shell"
    process_name: env
    process_args: "env /bin/sh"
    should_match: true
  - cleartext: "normal env"
    process_name: env
    process_args: "env | grep PATH"
    should_match: false
