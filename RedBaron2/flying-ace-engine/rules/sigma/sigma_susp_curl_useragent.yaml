name: sigma_susp_curl_useragent
mode: alert
overlap_allowed_with: [sigma_curl_usage]
eval: |
  (
    e.process_name == "curl" && (e.process_args.contains(" -A ") || e.process_args.contains(" --user-agent "))
  )

tests:
  - cleartext: "curl execution"
    process_name: curl
    process_args: "curl  -A "
    should_match: true
  - cleartext: "normal ls command"
    process_name: ls
    process_args: "ls -la"
    should_match: false
