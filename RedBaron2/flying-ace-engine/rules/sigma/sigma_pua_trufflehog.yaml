name: sigma_pua_trufflehog
mode: alert
eval: |
  (
    (e.process_name == "trufflehog") || (((e.process_args.contains(" docker --image ") || e.process_args.contains(" Git ") || e.process_args.contains(" GitHub ") || e.process_args.contains(" Jira ") || e.process_args.contains(" Slack ") || e.process_args.contains(" Confluence ") || e.process_args.contains(" SharePoint ") || e.process_args.contains(" s3 ") || e.process_args.contains(" gcs "))) && (e.process_args.contains(" --results=verified")))
  )

tests:
  - cleartext: "trufflehog execution"
    process_name: trufflehog
    process_args: "trufflehog  docker --image "
    should_match: true
  - cleartext: "normal ls command"
    process_name: ls
    process_args: "ls -la"
    should_match: false
