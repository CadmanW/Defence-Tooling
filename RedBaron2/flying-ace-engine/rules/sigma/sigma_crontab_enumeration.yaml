name: sigma_crontab_enumeration
mode: alert
eval: |
  (
    e.process_name == "crontab" && e.process_args.contains(" -l")
  )

tests:
  - cleartext: "crontab execution"
    process_name: crontab
    process_args: "crontab  -l"
    should_match: true
  - cleartext: "normal ls command"
    process_name: ls
    process_args: "ls -la"
    should_match: false
