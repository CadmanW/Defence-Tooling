name: sigma_capsh_shell_invocation
mode: alert
eval: |
  (
    e.process_name == "capsh" && e.process_args.ends_with(" --")
  )

tests:
  - cleartext: "capsh spawning shell"
    process_name: capsh
    process_args: "capsh --caps=cap_setuid+eip --"
    should_match: true
  - cleartext: "capsh with other args"
    process_name: capsh
    process_args: "capsh --print"
    should_match: false
  - cleartext: "normal ls"
    process_name: ls
    process_args: "ls -la"
    should_match: false
