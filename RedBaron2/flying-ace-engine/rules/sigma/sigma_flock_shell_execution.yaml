name: sigma_flock_shell_execution
mode: alert
eval: |
  (
    (e.process_name == "flock" && e.process_args.contains(" -u ")) && ((e.process_args.contains("/bin/bash") || e.process_args.contains("/bin/dash") || e.process_args.contains("/bin/fish") || e.process_args.contains("/bin/sh") || e.process_args.contains("/bin/zsh")))
  )

tests:
  - cleartext: "flock with -u and shell"
    process_name: flock
    process_args: "flock -u /tmp/lock /bin/bash -c whoami"
    should_match: true
  - cleartext: "flock -u with sh"
    process_name: flock
    process_args: "flock -u 200 /bin/sh"
    should_match: true
  - cleartext: "normal flock"
    process_name: flock
    process_args: "flock /var/lock/myapp.lock"
    should_match: false
