name: sigma_bpf_kprob_tracing_enabled
mode: alert
eval: |
  (
    (e.process_args.contains("echo 1 >") && e.process_args.contains("/sys/kernel/debug/tracing/events/kprobes/")) && (e.process_args.contains("/myprobe/enable") || e.process_args.contains("/myretprobe/enable"))
  )
tests:
  - cleartext: "enable kprobe myprobe"
    process_name: bash
    process_args: "bash -c 'echo 1 > /sys/kernel/debug/tracing/events/kprobes/myprobe/enable'"
    should_match: true
  - cleartext: "enable kprobe myretprobe"
    process_name: sh
    process_args: "sh -c 'echo 1 > /sys/kernel/debug/tracing/events/kprobes/myretprobe/enable'"
    should_match: true
  - cleartext: "normal ls"
    process_name: ls
    process_args: "ls -la"
    should_match: false
