name: sigma_setgid_setuid
mode: alert
eval: |
  (
    (e.process_args.contains("chown root")) && ((e.process_args.contains(" chmod u+s") || e.process_args.contains(" chmod g+s")))
  )
tests:
  - cleartext: "chown root and chmod u+s"
    process_name: bash
    process_args: "bash -c 'chown root /usr/bin/find && chmod u+s /usr/bin/find'"
    should_match: true
  - cleartext: "chown root and chmod g+s"
    process_name: sh
    process_args: "sh -c 'chown root /bin/bash && chmod g+s /bin/bash'"
    should_match: true
  - cleartext: "normal chmod"
    process_name: chmod
    process_args: "chmod 644 file.txt"
    should_match: false
