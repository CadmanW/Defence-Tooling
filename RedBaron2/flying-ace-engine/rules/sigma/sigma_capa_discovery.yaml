name: sigma_capa_discovery
mode: alert
eval: |
  (
    e.process_name == "getcap" && e.process_args.contains(" -r ")
  )

tests:
  - cleartext: "getcap execution"
    process_name: getcap
    process_args: "getcap  -r "
    should_match: true
  - cleartext: "normal ls command"
    process_name: ls
    process_args: "ls -la"
    should_match: false
