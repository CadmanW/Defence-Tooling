name: sigma_awk_shell_spawn
mode: alert
eval: |
  (
    ((e.process_name == "awk" || e.process_name == "gawk" || e.process_name == "mawk" || e.process_name == "nawk") && e.process_args.contains("BEGIN {system")) && ((e.process_args.contains("/bin/bash") || e.process_args.contains("/bin/dash") || e.process_args.contains("/bin/fish") || e.process_args.contains("/bin/sh") || e.process_args.contains("/bin/zsh")))
  )

tests:
  - cleartext: "awk BEGIN system with shell"
    process_name: awk
    process_args: "awk 'BEGIN {system(\"/bin/sh\")}'"
    should_match: true
  - cleartext: "gawk BEGIN system with bash"
    process_name: gawk
    process_args: "gawk 'BEGIN {system(\"/bin/bash\")}'"
    should_match: true
  - cleartext: "normal awk"
    process_name: awk
    process_args: "awk '{print $1}' file.txt"
    should_match: false
