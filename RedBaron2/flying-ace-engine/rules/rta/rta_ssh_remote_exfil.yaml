name: rta_ssh_remote_exfil
mode: alert
eval: |
  (
    e.process_name == "ssh" &&
    e.process_args.contains("tar") &&
    (
      e.process_args.contains("/etc") ||
      e.process_args.contains("/root") ||
      e.process_args.contains("shadow") ||
      e.process_args.contains("passwd")
    )
  )
tests:
  - cleartext: "SSH tar archive of /etc directory"
    process_name: ssh
    process_args: 'ssh target.example.com "(cd /etc && tar -zcvf - *) > ./etc.tar.gz"'
    should_match: true
  - cleartext: "SSH tar archive over SSH to localhost"
    process_name: ssh
    process_args: "ssh localhost tar -zcvf /tmp/test.tar.gz /etc/test"
    should_match: true
  - cleartext: "SSH tar to non-sensitive directory"
    process_name: ssh
    process_args: "ssh localhost tar -zcvf /tmp/logs.tar.gz /tmp/logs"
    should_match: false
