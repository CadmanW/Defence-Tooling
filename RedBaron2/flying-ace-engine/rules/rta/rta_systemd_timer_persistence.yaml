name: rta_systemd_timer_persistence
mode: alert
eval: |
  (
    (e.process_name == "systemd-run" &&
     re_match(e.process_args, "--on-calendar|--on-active|--on-boot|--timer")) ||
    (e.process_name == "systemctl" &&
     e.process_args.contains("daemon-reload"))
  )
tests:
  - cleartext: "systemd-run with calendar timer"
    process_name: systemd-run
    process_args: "systemd-run --unit=Atomic-Red-Team --on-calendar *:0/1 /bin/sh -c echo test >> /tmp/log"
    should_match: true
  - cleartext: "systemd-run timer with minute"
    process_name: systemd-run
    process_args: "systemd-run --on-calendar=*:* --timer"
    should_match: true
  - cleartext: "systemctl daemon-reload"
    process_name: systemctl
    process_args: "systemctl daemon-reload"
    should_match: true
  - cleartext: "systemctl reload normal service"
    process_name: systemctl
    process_args: "systemctl reload nginx"
    should_match: false
