name: rta_ed_shell_escape
mode: alert
eval: |
  (
    (e.process_pname == "ed" && (e.process_name == "sh" || e.process_name == "bash")) ||
    (e.process_name == "ed" && re_match(e.process_args, "!/bin/(sh|bash)"))
  )
tests:
  - cleartext: "ed shell escape to sh"
    process_name: sh
    process_pname: ed
    process_args: "/bin/sh"
    should_match: true
  - cleartext: "ed shell escape to bash"
    process_name: bash
    process_pname: ed
    process_args: "/bin/bash"
    should_match: true
  - cleartext: "normal ed usage"
    process_name: ed
    process_args: "ed file.txt"
    should_match: false
