name: rta_xxd_hex_decode_exec
mode: alert
eval: |
  (
    e.process_name == "xxd" &&
    re_match(e.process_args, "-r") &&
    (
      re_match(e.process_args, "\\|\\s*(bash|sh)") ||
      re_match(e.process_args, "\\|\\s*eval") ||
      re_match(e.process_args, "\\|\\s*exec")
    )
  )
tests:
  - cleartext: "xxd reverse hex decode to bash"
    process_name: xxd
    process_args: "xxd -r -p payload.hex | bash"
    should_match: true
  - cleartext: "xxd decode to sh"
    process_name: xxd
    process_args: "echo 2f62696e2f7368 | xxd -r -p | sh"
    should_match: true
  - cleartext: "xxd decode to eval"
    process_name: xxd
    process_args: "xxd -r encoded.hex | eval"
    should_match: true
  - cleartext: "normal xxd hex dump"
    process_name: xxd
    process_args: "xxd file.bin"
    should_match: false
  - cleartext: "xxd decode to file"
    process_name: xxd
    process_args: "xxd -r input.hex > output.bin"
    should_match: false
