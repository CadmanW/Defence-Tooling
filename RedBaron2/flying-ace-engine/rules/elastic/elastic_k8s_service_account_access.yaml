name: elastic_k8s_service_account_access
mode: alert
eval: |
  (
    (
      e.process_args.contains("/run/secrets/kubernetes.io/serviceaccount/token") ||
      e.process_args.contains("/var/run/secrets/kubernetes.io/serviceaccount/token") ||
      e.process_args.contains("/secrets/kubernetes.io/serviceaccount/token")
    ) &&
    !(
      e.process_name == "cat" && e.process_ppid == 1
    )
  )
tests:
  - cleartext: "cat /run/secrets/kubernetes.io/serviceaccount/token"
    process_name: cat
    process_args: "cat /run/secrets/kubernetes.io/serviceaccount/token"
    process_ppid: 1234
    should_match: true
  - cleartext: "cat /var/run/secrets/kubernetes.io/serviceaccount/token"
    process_name: cat
    process_args: "cat /var/run/secrets/kubernetes.io/serviceaccount/token"
    process_ppid: 5678
    should_match: true
  - cleartext: "curl -H Authorization: Bearer $(cat /run/secrets/kubernetes.io/serviceaccount/token)"
    process_name: bash
    process_args: "bash -c curl -H Authorization: Bearer $(cat /run/secrets/kubernetes.io/serviceaccount/token)"
    process_ppid: 1000
    should_match: true
  - cleartext: "cat /etc/passwd"
    process_name: cat
    process_args: "cat /etc/passwd"
    process_ppid: 1234
    should_match: false
  - cleartext: "ls /run/secrets"
    process_name: ls
    process_args: "ls /run/secrets"
    process_ppid: 1234
    should_match: false
