name: elastic_proot_container_escape
mode: alert
eval: |
  (
    e.process_name == "proot" ||
    e.process_args.contains("proot")
  )
tests:
  - cleartext: "proot -r /host"
    process_name: proot
    process_args: "proot -r /host"
    should_match: true
  - cleartext: "proot -0 -r / /bin/bash"
    process_name: proot
    process_args: "proot -0 -r / /bin/bash"
    should_match: true
  - cleartext: "./proot -S /rootfs /bin/sh"
    process_name: proot
    process_args: "./proot -S /rootfs /bin/sh"
    should_match: true
  - cleartext: "/tmp/proot -r /mnt"
    process_name: bash
    process_args: "bash -c /tmp/proot -r /mnt"
    should_match: true
  - cleartext: "chroot /newroot /bin/bash"
    process_name: chroot
    process_args: "chroot /newroot /bin/bash"
    should_match: false
  - cleartext: "ls /tmp"
    process_name: ls
    process_args: "ls /tmp"
    should_match: false
