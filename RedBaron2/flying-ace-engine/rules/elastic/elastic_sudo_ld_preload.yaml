name: elastic_sudo_ld_preload
mode: alert
eval: |
  (
    e.process_name == "sudo" &&
    (
      e.process_args.contains("LD_PRELOAD") ||
      e.process_args.contains("LD_LIBRARY_PATH")
    )
  )
tests:
  - cleartext: "sudo with LD_PRELOAD"
    process_name: sudo
    process_args: "sudo LD_PRELOAD=/tmp/evil.so /bin/bash"
    should_match: true
  - cleartext: "sudo LD_LIBRARY_PATH injection"
    process_name: sudo
    process_args: "sudo LD_LIBRARY_PATH=/tmp /usr/bin/id"
    should_match: true
  - cleartext: "sudo env LD_PRELOAD"
    process_name: sudo
    process_args: "sudo env LD_PRELOAD=/tmp/rootkit.so whoami"
    should_match: true
  - cleartext: "normal sudo"
    process_name: sudo
    process_args: "sudo apt update"
    should_match: false
  - cleartext: "sudo su"
    process_name: sudo
    process_args: "sudo su -"
    should_match: false
