name: elastic_kubeconfig_discovery
mode: alert
eval: |
  (
    (
      e.process_args.contains(".kube/config") ||
      e.process_args.contains("kubeconfig") ||
      e.process_args.contains("KUBECONFIG")
    ) &&
    (
      e.process_name == "find" ||
      e.process_name == "cat" ||
      e.process_name == "grep" ||
      e.process_name == "less" ||
      e.process_name == "more" ||
      e.process_name == "tail" ||
      e.process_name == "head" ||
      e.process_name == "env"
    )
  )
tests:
  - cleartext: "cat ~/.kube/config"
    process_name: cat
    process_args: "cat ~/.kube/config"
    should_match: true
  - cleartext: "find /home -name kubeconfig"
    process_name: find
    process_args: "find /home -name kubeconfig"
    should_match: true
  - cleartext: "grep server ~/.kube/config"
    process_name: grep
    process_args: "grep server ~/.kube/config"
    should_match: true
  - cleartext: "env | grep KUBECONFIG"
    process_name: env
    process_args: "env | grep KUBECONFIG"
    should_match: true
  - cleartext: "less /etc/kubernetes/admin.kube/config"
    process_name: less
    process_args: "less /etc/kubernetes/admin.kube/config"
    should_match: true
  - cleartext: "cat /etc/hosts"
    process_name: cat
    process_args: "cat /etc/hosts"
    should_match: false
  - cleartext: "find /tmp -name *.txt"
    process_name: find
    process_args: "find /tmp -name *.txt"
    should_match: false
